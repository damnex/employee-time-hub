<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Syncronize</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --boot-bg-start: #f8fbff;
        --boot-bg-end: #eef4ff;
        --boot-ring: #2563eb;
        --boot-ring-soft: rgba(37, 99, 235, 0.18);
        --boot-text: #0f172a;
        --boot-subtle: #64748b;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 28%),
          linear-gradient(180deg, var(--boot-bg-start), var(--boot-bg-end));
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 28%),
          linear-gradient(180deg, var(--boot-bg-start), var(--boot-bg-end));
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #boot-splash.boot-splash--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-splash__card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 28px 32px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(12px);
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      .boot-splash__spinner {
        position: relative;
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: 4px solid var(--boot-ring-soft);
        border-top-color: var(--boot-ring);
        animation: boot-spin 0.85s linear infinite;
      }

      .boot-splash__spinner::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: inherit;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 70%);
      }

      .boot-splash__title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: var(--boot-text);
      }

      .boot-splash__subtitle {
        margin: -8px 0 0;
        font-size: 0.82rem;
        color: var(--boot-subtle);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-label="Application loading">
      <div class="boot-splash__card">
        <div class="boot-splash__spinner" aria-hidden="true"></div>
        <p class="boot-splash__title">Loading Syncronize</p>
        <p class="boot-splash__subtitle">Preparing dashboard</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
