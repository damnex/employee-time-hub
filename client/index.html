    <style>
  :root {
    color-scheme: light dark;
    --boot-accent-a: #22c55e;
    --boot-accent-b: #38bdf8;

    --boot-bg-start: #f6fbff;
    --boot-bg-end: #eef5ff;
    --boot-card: rgba(255, 255, 255, 0.78);
    --boot-border: rgba(148, 163, 184, 0.28);

    --boot-text: #0f172a;
    --boot-subtle: rgba(15, 23, 42, 0.58);

    --boot-shadow: 0 26px 90px rgba(15, 23, 42, 0.14);
    --boot-glow: rgba(34, 197, 94, 0.22);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --boot-bg-start: #0b1220;
      --boot-bg-end: #060b16;
      --boot-card: rgba(17, 24, 39, 0.62);
      --boot-border: rgba(148, 163, 184, 0.18);
      --boot-text: rgba(229, 231, 235, 0.96);
      --boot-subtle: rgba(229, 231, 235, 0.6);
      --boot-shadow: 0 38px 120px rgba(0, 0, 0, 0.55);
      --boot-glow: rgba(34, 197, 94, 0.26);
    }
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at 12% 10%, rgba(34, 197, 94, 0.14), transparent 38%),
      radial-gradient(circle at 82% 18%, rgba(56, 189, 248, 0.12), transparent 42%),
      linear-gradient(180deg, var(--boot-bg-start), var(--boot-bg-end));
  }

  #boot-splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    background:
      radial-gradient(circle at 12% 10%, rgba(34, 197, 94, 0.14), transparent 38%),
      radial-gradient(circle at 82% 18%, rgba(56, 189, 248, 0.12), transparent 42%),
      linear-gradient(180deg, var(--boot-bg-start), var(--boot-bg-end));
    transition: opacity 220ms ease, visibility 220ms ease;
  }

  #boot-splash::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    background-image:
      linear-gradient(rgba(148, 163, 184, 0.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, 0.12) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(circle at center, rgba(0,0,0,0.9), transparent 66%);
  }

  #boot-splash.boot-splash--hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .boot-splash__card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 30px 34px 26px;
    border: 1px solid var(--boot-border);
    border-radius: 26px;
    background: var(--boot-card);
    box-shadow: var(--boot-shadow);
    backdrop-filter: blur(14px);
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    transform: translateZ(0);
  }

  .boot-splash__card::after {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    pointer-events: none;
    background: radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 55%);
    opacity: 0.8;
    filter: blur(0px);
    mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding: 1px;
  }
  .boot-splash__emblem {
    --emblem-size: clamp(188px, 22vw, 248px);
    --emblem-radius: clamp(40px, 4.6vw, 58px);

    position: relative;
    width: var(--emblem-size);
    height: var(--emblem-size);
    display: grid;
    place-items: center;
    border-radius: var(--emblem-radius);
    background: rgba(0, 0, 0, 0.16);
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow:
      0 22px 70px rgba(0,0,0,0.26),
      0 0 0 1px rgba(34,197,94,0.18),
      0 0 76px var(--boot-glow);
    overflow: hidden;
    isolation: isolate;
    animation: boot-float 1.55s ease-in-out infinite;
  }

  .boot-splash__emblem::before {
    content: "";
    position: absolute;
    inset: -30px;
    border-radius: 999px;
    background: conic-gradient(
      from 180deg,
      transparent,
      rgba(56, 189, 248, 0.95),
      rgba(34, 197, 94, 0.95),
      transparent
    );
    opacity: 0.32;
    filter: blur(0.8px);
    mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 11px));
    animation: boot-pulse 1.35s ease-in-out infinite;
    z-index: 0;
  }

  .boot-splash__emblem::after {
    content: "";
    position: absolute;
    inset: -26px;
    border-radius: 999px;
    background: conic-gradient(
      from 10deg,
      transparent 0 78%,
      rgba(255, 255, 255, 0.85) 83%,
      transparent 90% 100%
    );
    opacity: 0.42;
    mask: radial-gradient(farthest-side, transparent calc(100% - 12px), #000 calc(100% - 12px));
    animation: boot-orbit 1.05s linear infinite reverse;
    z-index: 0;
  }
  .boot-splash__logo {
    position: relative;
    z-index: 2;
    width: calc(var(--emblem-size) * 0.74);
    height: calc(var(--emblem-size) * 0.74);
    object-fit: contain;
    filter: drop-shadow(0 22px 30px rgba(0,0,0,0.38));
    transform: translateZ(0);
  }
  .boot-splash__orbit {
    position: absolute;
    inset: -18px;
    border-radius: 999px;
    background: conic-gradient(
      from 180deg,
      transparent,
      var(--boot-accent-b),
      var(--boot-accent-a),
      transparent
    );
    opacity: 0.92;
    animation: boot-orbit 0.95s linear infinite;
    mask: radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 9px));
    z-index: 1;
  }

  .boot-splash__orbit--soft {
    inset: -30px;
    opacity: 0.52;
    filter: blur(1.7px);
    animation-duration: 1.65s;
  }
  .boot-splash__sweep {
    position: absolute;
    inset: -10px;
    border-radius: 999px;
    background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.55) 48%, transparent 62%);
    opacity: 0.34;
    animation: boot-sweep 1.25s ease-in-out infinite;
    mask: radial-gradient(farthest-side, transparent calc(100% - 22px), #000 calc(100% - 22px));
    z-index: 1;
  }
  .boot-splash__title {
    margin: 0;
    font-size: 1.02rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    color: var(--boot-text);
  }

  .boot-splash__subtitle {
    margin: -6px 0 0;
    font-size: 0.8rem;
    color: var(--boot-subtle);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  @keyframes boot-orbit {
    to { transform: rotate(360deg); }
  }

  @keyframes boot-float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
  }

  @keyframes boot-sweep {
    0% { transform: rotate(0deg); opacity: 0.18; }
    35% { opacity: 0.42; }
    100% { transform: rotate(360deg); opacity: 0.18; }
  }
  @keyframes boot-pulse {
    0%, 100% { transform: scale(0.985); opacity: 0.22; }
    50% { transform: scale(1.03); opacity: 0.46; }
  }

  @media (prefers-reduced-motion: reduce) {
    .boot-splash__emblem,
    .boot-splash__emblem::before,
    .boot-splash__emblem::after,
    .boot-splash__orbit,
    .boot-splash__sweep {
      animation: none !important;
    }
  }
</style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-label="Application loading">
      <div class="boot-splash__card">
  <div class="boot-splash__emblem" aria-hidden="true">
    <div class="boot-splash__orbit"></div>
    <div class="boot-splash__orbit boot-splash__orbit--soft"></div>
    <div class="boot-splash__sweep"></div>
    <img class="boot-splash__logo" src="/logo.png" alt="" />
  </div>
  <p class="boot-splash__title">Syncronize</p>
  <p class="boot-splash__subtitle">Initializing gate monitor</p>
</div>    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
